name: Sync to Org

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Org
        env:
          TOKEN: ${{ secrets.ORG_ACCESS_TOKEN }}
        run: |
          git remote add org https://x-access-token:${TOKEN}@github.com/Phorex-Labz/phorex-labz-website.git
          git push org main --force